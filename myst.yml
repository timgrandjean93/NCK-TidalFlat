# myst.yml — Jupyter Book 2 (MyST Document Engine) configuration
# ---------------------------------------------------------------------------
# Page order is set by the `toc` below:
#   1. Home (index.md)
#   2. Setup — environment & installation (01_setup.md)
#   3. Connecting to the data services (02_services.md)
#   4. Route 1 notebook (GEE)
#   5. Route 2 notebook (PC)
#
# Build locally:   jupyter book start      (live preview at localhost:3000)
# Build static:    jupyter book build --html
# ---------------------------------------------------------------------------
version: 1

project:
  id: nck-tidalflat
  title: Mapping Intertidal Elevation
  subtitle: Two open-data routes — Google Earth Engine and Microsoft Planetary Computer
  description: >-
    A graduate-level, reproducible tutorial for mapping intertidal elevation from
    open satellite imagery (Landsat) and the FES2022 global tide model.
  keywords:
    - intertidal
    - remote sensing
    - Google Earth Engine
    - Planetary Computer
    - FES2022
    - tide model
    - coastal geomorphology
  github: https://github.com/timgrandjean93/NCK-TidalFlat

  # The notebooks need GEE auth / AVISO data / local tide files, so they CANNOT be
  # executed on a CI server. Publish them exactly as committed.
  jupyter: false

  # Table of contents — the left-hand site navigation, in order.
  toc:
    - file: index.md
    - file: 01_setup.md
    - file: 02_services.md
    - title: Route 1 — Google Earth Engine
      children:
        - file: gee/intertidal_elevation_GEE_tutorial.ipynb
    - title: Route 2 — Planetary Computer + DEA
      children:
        - file: pc/intertidal_elevation_PC_tutorial.ipynb

site:
  template: book-theme
  options:
    logo_text: NCK-TidalFlat
  actions:
    - title: View on GitHub
      url: https://github.com/timgrandjean93/NCK-TidalFlat
