# myst.yml — Jupyter Book 2 (MyST Document Engine) configuration
# ---------------------------------------------------------------------------
# Tutorial pages (numbered):
#   Home → 1 Setup → 2–6 executable; Applications, Cleanup, Disclaimer unnumbered
#
# Navigation: sidebar TOC only (no top nav bar links)
# Logo: images/tidalflat_logo.png
#
# Live preview + execution:  ./scripts/start-site-execute.sh
# Static build + execution:   ./scripts/build-site-execute.sh
# ---------------------------------------------------------------------------
version: 1

project:
  id: nck-tidalflat
  title: Mapping Intertidal Elevation
  subtitle: Planetary Computer + DEA Intertidal + FES2022
  description: >-
    A graduate-level tutorial for mapping intertidal elevation from open satellite
    imagery and the FES2022 global tide model.
  keywords:
    - intertidal
    - remote sensing
    - Planetary Computer
    - FES2022
    - coastal geomorphology
  github: https://github.com/timgrandjean93/NCK-TidalFlat

  jupyter: false

  toc:
    - file: index.md
      title: "Home"
    - file: 01_setup.md
      title: "1 · Setup"
    - file: 02_connect.ipynb
      title: "2 · Connect"
    - file: 03_tides.ipynb
      title: "3 · Tides"
    - file: 04_validation.ipynb
      title: "4 · Validation"
    - file: 05_ndwi.ipynb
      title: "5 · NDWI"
    - file: 06_elevation.ipynb
      title: "6 · Elevation"
    - file: 07_applications.md
      title: "Applications"
    - file: 07_cleanup.md
      title: "Cleanup"
    - file: 08_disclaimer.md
      title: "Disclaimer"

site:
  template: book-theme
  options:
    logo: images/tidalflat_logo.png
    logo_alt: Tidal Flat Elevation Mapping
    logo_url: /
    outline_maxdepth: 2
    style: styles/site.css
  nav: []
  actions: []
