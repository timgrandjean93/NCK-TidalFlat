# myst.yml — Jupyter Book 2 (MyST Document Engine) configuration
# ---------------------------------------------------------------------------
# Tutorial pages (numbered):
#   Home → 1 Setup (not executed) → 2–6 executable → 7 Cleanup (not executed)
#
# Live preview + execution:  ./scripts/start-site-execute.sh
# Static build + execution:   ./scripts/build-site-execute.sh
# ---------------------------------------------------------------------------
version: 1

project:
  id: nck-tidalflat
  title: Mapping Intertidal Elevation
  subtitle: Planetary Computer + DEA Intertidal + FES2022
  description: >-
    A graduate-level tutorial for mapping intertidal elevation from open satellite
    imagery and the FES2022 global tide model.
  keywords:
    - intertidal
    - remote sensing
    - Planetary Computer
    - FES2022
    - coastal geomorphology
  github: https://github.com/timgrandjean93/NCK-TidalFlat

  jupyter: false

  toc:
    - file: index.md
    - file: 01_setup.md
      title: "1 · Setup"
    - file: 02_connect.ipynb
      title: "2 · Connect"
    - file: 03_tides.ipynb
      title: "3 · Tides"
    - file: 04_validation.ipynb
      title: "4 · Validation"
    - file: 05_ndwi.ipynb
      title: "5 · NDWI"
    - file: 06_elevation.ipynb
      title: "6 · Elevation"
    - file: 07_cleanup.md
      title: "7 · Cleanup"

site:
  template: book-theme
  options:
    logo_text: NCK-TidalFlat
    outline_maxdepth: 3
  nav:
    - title: Home
      url: index
    - title: "1 · Setup"
      url: /setup
    - title: "2 · Connect"
      url: /connect
    - title: "3 · Tides"
      url: /tides
    - title: "4 · Validation"
      url: /validation
    - title: "5 · NDWI"
      url: /ndwi
    - title: "6 · Elevation"
      url: /elevation
    - title: "7 · Cleanup"
      url: /cleanup
  actions:
    - title: View on GitHub
      url: https://github.com/timgrandjean93/NCK-TidalFlat
